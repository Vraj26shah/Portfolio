<svg xmlns="http://www.w3.org/2000/svg" width="600" height="420" viewBox="0 0 600 420">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4b5563"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="600" height="420" fill="#0f172a"/>

  <!-- Row 1: User / Browser -->
  <rect x="215" y="18" width="170" height="62" rx="10" fill="#1e3a5f"/>
  <text x="300" y="44" text-anchor="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="13" font-weight="700">User / Browser</text>
  <text x="300" y="62" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="11">Scheduling interface</text>

  <!-- arrow down -->
  <line x1="300" y1="80" x2="300" y2="108" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Row 2: HTML/CSS Layer -->
  <rect x="215" y="116" width="170" height="62" rx="10" fill="#1e40af"/>
  <text x="300" y="142" text-anchor="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="13" font-weight="700">HTML / CSS Layer</text>
  <text x="300" y="160" text-anchor="middle" fill="#bfdbfe" font-family="Arial,sans-serif" font-size="11">Grid, forms, responsive</text>

  <!-- arrow down -->
  <line x1="300" y1="178" x2="300" y2="206" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Row 3: JavaScript Engine -->
  <rect x="215" y="214" width="170" height="62" rx="10" fill="#92400e"/>
  <text x="300" y="240" text-anchor="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="13" font-weight="700">JavaScript Engine</text>
  <text x="300" y="258" text-anchor="middle" fill="#fde68a" font-family="Arial,sans-serif" font-size="11">Constraint solver</text>

  <!-- three arrows out -->
  <line x1="215" y1="245" x2="170" y2="306" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="300" y1="276" x2="300" y2="306" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="385" y1="245" x2="430" y2="306" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Row 4: LocalStorage, Schedule Grid, Export -->
  <rect x="28" y="314" width="140" height="62" rx="10" fill="#14532d"/>
  <text x="98" y="340" text-anchor="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="12" font-weight="700">LocalStorage</text>
  <text x="98" y="358" text-anchor="middle" fill="#86efac" font-family="Arial,sans-serif" font-size="11">Auto-save sessions</text>

  <rect x="215" y="314" width="170" height="62" rx="10" fill="#374151"/>
  <text x="300" y="340" text-anchor="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="12" font-weight="700">Schedule Grid</text>
  <text x="300" y="358" text-anchor="middle" fill="#d1d5db" font-family="Arial,sans-serif" font-size="11">Day / slot display</text>

  <rect x="432" y="314" width="140" height="62" rx="10" fill="#4c1d95"/>
  <text x="502" y="340" text-anchor="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="12" font-weight="700">Print / Export</text>
  <text x="502" y="358" text-anchor="middle" fill="#c4b5fd" font-family="Arial,sans-serif" font-size="11">PDF, share link</text>

  <!-- arrow from Grid to Vercel -->
  <line x1="300" y1="376" x2="300" y2="396" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Row 5: Vercel CDN -->
  <rect x="215" y="400" width="170" height="16" rx="5" fill="#1e3a5f"/>
  <text x="300" y="413" text-anchor="middle" fill="#93c5fd" font-family="Arial,sans-serif" font-size="11" font-weight="700">Vercel CDN — Global deploy</text>
</svg>
